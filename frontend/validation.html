<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melko Energie - Audit des donnees</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Merriweather:wght@400;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {
                fontFamily: { sans: ['Montserrat','sans-serif'], serif: ['Merriweather','serif'], mono: ['Source Code Pro','monospace'] },
                colors: {
                    nature: { 50:'#f8f5f0',100:'#f0e9e0',200:'#e0d6c9',300:'#c8e6c9',400:'#a5d6a7',500:'#4caf50',600:'#388e3c',700:'#2e7d32',800:'#1b5e20',900:'#0a1f0c' },
                    bark: { 50:'#f0ebe5',100:'#d7cfc4',200:'#6d4c41',300:'#3e2723' },
                    forest: { card:'#2d3a2e',input:'#3e4a3d',bg:'#1c2a1f' }
                }
            }}
        }
    </script>
    <style>
        .perspective { perspective: 1200px; }
        @keyframes cardIn { from { transform: translateY(40px) rotateX(-8deg) scale(0.96); opacity:0; } to { transform: none; opacity:1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: none; opacity:1; } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes pulseGlow { 0%,100%{ box-shadow: 0 0 0 rgba(46,125,50,0); } 50%{ box-shadow: 0 0 25px rgba(46,125,50,0.15); } }
        .anim-card { animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both; }
        .anim-up { animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
        .anim-fade { animation: fadeIn 0.4s ease both; }

        .glass { background: rgba(248,245,240,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(224,214,201,0.6); }
        .dark .glass { background: rgba(18,30,20,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(76,175,80,0.12); }
        .glass-card { background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); border: 1px solid rgba(224,214,201,0.5); transition: all 0.4s cubic-bezier(0.16,1,0.3,1); transform-style: preserve-3d; }
        .dark .glass-card { background: rgba(25,40,28,0.75); border: 1px solid rgba(76,175,80,0.1); }
        .glass-card:hover { transform: translateY(-3px) rotateX(1deg) scale(1.005); box-shadow: 0 16px 32px rgba(0,0,0,0.08), 0 0 20px rgba(46,125,50,0.08); }
        .dark .glass-card:hover { box-shadow: 0 16px 32px rgba(0,0,0,0.3), 0 0 25px rgba(76,175,80,0.1); }

        .drop-zone { transition: all 0.4s cubic-bezier(0.16,1,0.3,1); transform-style: preserve-3d; }
        .drop-zone.dragover { transform: scale(1.02) rotateX(2deg); border-color: #2e7d32 !important; box-shadow: 0 0 40px rgba(46,125,50,0.15); }

        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#f0e9e0; } ::-webkit-scrollbar-thumb { background:#2e7d32; border-radius:3px; }
        .dark ::-webkit-scrollbar-track { background:#0d1a0f; } .dark ::-webkit-scrollbar-thumb { background:#388e3c; }

        .commune-card { transition: all 0.4s cubic-bezier(0.16,1,0.3,1); transform-style: preserve-3d; }
        .commune-card:hover { transform: translateY(-2px) rotateX(1deg); }
        .issue-pill { transition: all 0.2s ease; }
        .issue-pill:hover { transform: translateX(2px); }

        .mode-btn { transition: all 0.3s ease; }
        .mode-btn.active { box-shadow: 0 4px 14px rgba(46,125,50,0.25); transform: scale(1.03); }

        .particles { position:fixed; top:0; left:0; right:0; bottom:0; overflow:hidden; z-index:0; pointer-events:none; }
        .particle { position:absolute; border-radius:50%; background:rgba(46,125,50,0.1); animation: pFloat linear infinite; }
        .dark .particle { background:rgba(76,175,80,0.12); box-shadow: 0 0 4px rgba(76,175,80,0.2); }
        @keyframes pFloat { 0%{transform:translateY(100vh) rotate(0);opacity:0;} 10%{opacity:0.5;} 90%{opacity:0.5;} 100%{transform:translateY(-10vh) rotate(360deg);opacity:0;} }

        .compare-bar { transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
    </style>
</head>
<body class="bg-nature-50 dark:bg-[#0d1a0f] text-bark-300 dark:text-bark-50 font-sans min-h-screen transition-colors duration-500">

    <div class="particles" id="particles"></div>

    <div class="relative z-10 min-h-screen">

    <!-- Header -->
    <header class="glass border-b border-nature-200 dark:border-forest-input sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="/static/assets/logo_melko.jpg" alt="Melko" class="h-10 w-10 rounded-xl shadow-lg shadow-nature-700/20">
                <div>
                    <h1 class="text-lg font-bold bg-gradient-to-r from-nature-700 to-nature-500 bg-clip-text text-transparent">Audit des donnees</h1>
                    <p class="text-xs text-bark-200 dark:text-bark-100 tracking-wider">VERIFICATION PAR COMMUNE</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl glass flex items-center justify-center cursor-pointer hover:scale-110 transition-transform">
                    <svg class="w-5 h-5 text-amber-400 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg class="w-5 h-5 text-nature-700 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
                <a href="/" class="px-4 py-2 rounded-xl glass text-sm font-medium hover:scale-105 transition-transform">Retour</a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8 perspective">

        <!-- Mode selector -->
        <section id="modeSection" class="mb-6 anim-up">
            <div class="flex gap-3 justify-center">
                <button onclick="setMode('audit')" data-mode="audit" class="mode-btn active px-6 py-3 rounded-xl glass font-semibold text-sm">
                    <span class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-nature-700 dark:text-nature-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Audit du fichier
                    </span>
                </button>
                <button onclick="setMode('compare')" data-mode="compare" class="mode-btn px-6 py-3 rounded-xl glass font-semibold text-sm">
                    <span class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-nature-700 dark:text-nature-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                        Comparer avec le systeme
                    </span>
                </button>
            </div>
        </section>

        <!-- Upload -->
        <section id="uploadSection" class="mb-8 anim-up">
            <div id="dropZone" class="drop-zone glass-card rounded-2xl p-10 text-center cursor-pointer border-2 border-dashed border-nature-200 dark:border-forest-input hover:border-nature-500 group">
                <div class="transition-all duration-300 group-hover:scale-105">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-nature-300/40 to-nature-500/20 dark:from-nature-600/30 dark:to-nature-500/20 flex items-center justify-center">
                        <svg class="w-8 h-8 text-nature-700 dark:text-nature-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                    </div>
                    <h3 id="uploadTitle" class="text-lg font-semibold mb-1">Deposez le fichier Excel</h3>
                    <p id="uploadDesc" class="text-sm text-bark-200 dark:text-bark-100">L'analyse par commune demarre automatiquement</p>
                </div>
                <input type="file" id="fileInput" accept=".xlsx,.xls" class="hidden">
            </div>
        </section>

        <!-- Loading -->
        <section id="loadingSection" class="mb-8 hidden">
            <div class="glass-card rounded-2xl p-8 text-center anim-card">
                <div class="w-12 h-12 mx-auto mb-4 border-[3px] border-nature-700 dark:border-nature-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="font-semibold" id="loadingText">Analyse approfondie par commune...</p>
            </div>
        </section>

        <!-- Results -->
        <section id="resultsSection" class="hidden">

            <!-- Verdict -->
            <div id="verdictBanner" class="rounded-2xl p-6 mb-6 anim-up"></div>

            <!-- Summary -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="summaryCards"></div>

            <!-- Commune cards -->
            <div id="communeGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8"></div>

            <!-- Footer buttons -->
            <div class="text-center mt-6 mb-4">
                <button onclick="resetPage()" class="px-6 py-2.5 rounded-xl glass text-sm font-semibold hover:scale-105 transition-transform border border-nature-200 dark:border-forest-input">Analyser un autre fichier</button>
            </div>
        </section>

    </main>
    </div>

    <script>
        let currentMode = 'audit';
        let reportData = null;

        // ── Theme ──
        (function(){const s=localStorage.getItem('theme');if(s==='dark'||(!s&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');})();
        function toggleTheme(){document.documentElement.classList.toggle('dark');localStorage.setItem('theme',document.documentElement.classList.contains('dark')?'dark':'light');}

        // ── Particles ──
        (function(){const c=document.getElementById('particles');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(10+Math.random()*15)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(2+Math.random()*3)+'px';c.appendChild(p);}})();

        // ── Mode ──
        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
            if (m === 'compare') {
                document.getElementById('uploadTitle').textContent = 'Deposez le fichier Excel source';
                document.getElementById('uploadDesc').textContent = 'Compare les montants du fichier avec les sorties du systeme';
                document.getElementById('loadingText').textContent = 'Comparaison source vs systeme...';
            } else {
                document.getElementById('uploadTitle').textContent = 'Deposez le fichier Excel';
                document.getElementById('uploadDesc').textContent = 'L\'analyse par commune demarre automatiquement';
                document.getElementById('loadingText').textContent = 'Analyse approfondie par commune...';
            }
        }

        // ── Drop zone ──
        const dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput');
        dz.addEventListener('click',()=>fi.click());
        dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
        dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
        dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files.length)run(e.dataTransfer.files[0]);});
        fi.addEventListener('change',e=>{if(e.target.files.length)run(e.target.files[0]);});

        async function run(file) {
            if(!file.name.match(/\.xlsx?$/i))return;
            show('loadingSection');hide('uploadSection');hide('resultsSection');
            const fd=new FormData();fd.append('file',file);
            const endpoint = currentMode === 'compare' ? '/api/validate-compare' : '/api/validate-communes';
            try {
                const r=await fetch(endpoint,{method:'POST',body:fd});
                const d=await r.json();
                if(r.ok){reportData=d;renderResults();}
                else{alert(d.detail||'Erreur');show('uploadSection');}
            }catch(e){alert('Erreur serveur');show('uploadSection');}
            finally{hide('loadingSection');}
        }

        // ── Render ──
        function renderResults() {
            const d = reportData;
            show('resultsSection');

            const s = d.summary;
            const communes = d.communes || {};
            const comparison = d.comparison?.data || null;
            const hasCompare = currentMode === 'compare' && comparison;

            // Verdict
            renderVerdict(s, hasCompare, comparison);

            // Summary
            document.getElementById('summaryCards').innerHTML = `
                <div class="glass-card rounded-xl p-4 text-center anim-card" style="animation-delay:0.05s">
                    <p class="text-[10px] uppercase tracking-widest text-bark-200 dark:text-bark-100 mb-1">Communes</p>
                    <p class="text-2xl font-bold">${Object.keys(communes).filter(c=>c!=='(Commune vide)').length}</p>
                </div>
                <div class="glass-card rounded-xl p-4 text-center anim-card border-l-4 border-red-500" style="animation-delay:0.1s">
                    <p class="text-[10px] uppercase tracking-widest text-red-500 mb-1 font-bold">Erreurs</p>
                    <p class="text-2xl font-bold text-red-600 dark:text-red-400">${s.ERREUR}</p>
                </div>
                <div class="glass-card rounded-xl p-4 text-center anim-card border-l-4 border-amber-500" style="animation-delay:0.15s">
                    <p class="text-[10px] uppercase tracking-widest text-amber-500 mb-1 font-bold">A verifier</p>
                    <p class="text-2xl font-bold text-amber-600 dark:text-amber-400">${s.ATTENTION}</p>
                </div>
                <div class="glass-card rounded-xl p-4 text-center anim-card border-l-4 border-blue-500" style="animation-delay:0.2s">
                    <p class="text-[10px] uppercase tracking-widest text-blue-500 mb-1 font-bold">Suggestions</p>
                    <p class="text-2xl font-bold text-blue-600 dark:text-blue-400">${s.INFO}</p>
                </div>`;

            // Commune cards
            const sorted = Object.entries(communes)
                .filter(([c])=>c!=='(Commune vide)')
                .sort((a,b)=>(b[1].erreurs*100+b[1].attention*10+b[1].info)-(a[1].erreurs*100+a[1].attention*10+a[1].info));

            let html = '';
            sorted.forEach(([commune, stats], i) => {
                const comp = hasCompare ? comparison[commune] : null;
                const totalIssues = stats.erreurs + stats.attention + stats.info;

                // Status color
                let statusBorder, statusBg, statusIcon, statusText;
                if (stats.erreurs > 0) {
                    statusBorder='border-red-500'; statusBg='bg-red-500/8 dark:bg-red-500/10';
                    statusIcon='<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
                    statusText='Corrections requises';
                } else if (stats.attention > 0) {
                    statusBorder='border-amber-400'; statusBg='bg-amber-500/8 dark:bg-amber-500/8';
                    statusIcon='<svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>';
                    statusText='A verifier';
                } else {
                    statusBorder='border-nature-500'; statusBg='bg-nature-500/8 dark:bg-nature-500/8';
                    statusIcon='<svg class="w-5 h-5 text-nature-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                    statusText='OK';
                }

                html += `<details class="commune-card glass-card rounded-2xl overflow-hidden border-l-4 ${statusBorder} anim-card" style="animation-delay:${0.05*(i+1)}s" ${stats.erreurs>0?'open':''}>
                    <summary class="px-5 py-4 cursor-pointer hover:${statusBg}">
                        <div class="flex items-center gap-3">
                            ${statusIcon}
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <span class="font-bold text-lg">${esc(commune)}</span>
                                    ${stats.types.map(t=>`<span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${t==='TEE'?'bg-nature-500/15 text-nature-700 dark:text-nature-400':'bg-amber-500/15 text-amber-600 dark:text-amber-400'}">${t}</span>`).join('')}
                                </div>
                                <div class="flex items-center gap-4 mt-1 text-xs text-bark-200 dark:text-bark-100">
                                    <span>${stats.nb_lignes} lignes</span>
                                    <span>HT: ${fmtMoney(stats.total_ht)}</span>
                                    <span>Degrev: ${fmtMoney(stats.total_degrevement)}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 flex-shrink-0">
                                ${stats.erreurs?`<span class="w-6 h-6 rounded-full bg-red-500/15 text-red-600 dark:text-red-400 text-xs font-bold flex items-center justify-center">${stats.erreurs}</span>`:''}
                                ${stats.attention?`<span class="w-6 h-6 rounded-full bg-amber-500/15 text-amber-600 dark:text-amber-400 text-xs font-bold flex items-center justify-center">${stats.attention}</span>`:''}
                                ${totalIssues===0?`<span class="text-xs font-bold text-nature-600 dark:text-nature-400">${statusText}</span>`:''}
                                <svg class="w-4 h-4 text-bark-200 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                            </div>
                        </div>
                    </summary>
                    <div class="px-5 pb-5 pt-2 space-y-3 border-t border-nature-200/30 dark:border-forest-input/30">`;

                // Comparison section
                if (comp) {
                    const compColor = comp.statut === 'OK' || comp.statut === 'OK (arrondi)' ? 'nature' : comp.statut === 'NON GENERE' ? 'red' : 'amber';
                    html += `<div class="rounded-xl p-4 bg-${compColor}-500/5 dark:bg-${compColor}-500/8 border border-${compColor}-500/15 mb-3">
                        <p class="text-xs font-bold uppercase tracking-wider text-${compColor}-600 dark:text-${compColor}-400 mb-3">Comparaison Source vs Systeme</p>
                        <div class="grid grid-cols-3 gap-2 text-xs">
                            <div></div><div class="text-center font-semibold text-bark-200 dark:text-bark-100">Source</div><div class="text-center font-semibold text-bark-200 dark:text-bark-100">Systeme</div>
                            <div class="font-medium">HT Eligible</div><div class="text-center font-mono">${fmtMoney(comp.source_ht)}</div><div class="text-center font-mono">${fmtMoney(comp.systeme_ht)}</div>
                            <div class="font-medium">Degrevement</div><div class="text-center font-mono">${fmtMoney(comp.source_degrevement)}</div><div class="text-center font-mono">${fmtMoney(comp.systeme_degrevement)}</div>
                            <div class="font-medium">Nb lignes</div><div class="text-center font-mono">${comp.source_nb_lignes}</div><div class="text-center font-mono">${comp.systeme_nb_lignes}</div>
                        </div>
                        ${comp.ecart_ht > 1 ? `<div class="mt-2 text-xs"><span class="font-bold text-${compColor}-600 dark:text-${compColor}-400">Ecart HT: ${fmtMoney(comp.ecart_ht)}</span></div>` : ''}
                        <div class="mt-2 flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-${compColor}-500/15 text-${compColor}-600 dark:text-${compColor}-400">${comp.statut}</span>
                            ${comp.types_generes.length ? `<span class="text-[10px] text-bark-200 dark:text-bark-100">Types: ${comp.types_generes.join(', ')}</span>` : ''}
                        </div>
                    </div>`;
                }

                // Issues - encapsulated by severity
                if (totalIssues > 0) {
                    const sevGroups = [
                        { key:'ERREUR', icon:'&#10060;', label:'Erreurs', count: stats.erreurs,
                          headerBg:'bg-red-500/8 dark:bg-red-500/12', headerText:'text-red-600 dark:text-red-400',
                          pillBorder:'border-l-red-500 bg-red-500/5 dark:bg-red-500/8',
                          badgeCls:'bg-red-500/15 text-red-600 dark:text-red-400', open: false },
                        { key:'ATTENTION', icon:'&#9888;&#65039;', label:'A verifier', count: stats.attention,
                          headerBg:'bg-amber-500/8 dark:bg-amber-500/10', headerText:'text-amber-600 dark:text-amber-400',
                          pillBorder:'border-l-amber-400 bg-amber-500/5 dark:bg-amber-500/8',
                          badgeCls:'bg-amber-500/15 text-amber-600 dark:text-amber-400', open: false },
                        { key:'INFO', icon:'&#128161;', label:'Suggestions', count: stats.info,
                          headerBg:'bg-blue-500/5 dark:bg-blue-500/8', headerText:'text-blue-600 dark:text-blue-400',
                          pillBorder:'border-l-blue-400 bg-blue-500/3 dark:bg-blue-500/5',
                          badgeCls:'bg-blue-500/15 text-blue-600 dark:text-blue-400', open: false },
                    ];

                    sevGroups.forEach(sg => {
                        if (sg.count === 0) return;
                        const items = stats.anomalies.filter(a => a.severite === sg.key);

                        html += `<details class="rounded-xl overflow-hidden ${sg.headerBg} border border-nature-200/20 dark:border-forest-input/30" ${sg.open ? 'open' : ''}>
                            <summary class="px-4 py-2.5 cursor-pointer flex items-center gap-3 hover:brightness-95 transition-all">
                                <span class="text-base">${sg.icon}</span>
                                <span class="font-semibold text-sm ${sg.headerText}">${sg.label}</span>
                                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${sg.badgeCls}">${sg.count}</span>
                                <svg class="w-3.5 h-3.5 text-bark-200 dark:text-bark-100 ml-auto transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                            </summary>
                            <div class="px-3 pb-3 pt-1 space-y-1.5">`;

                        items.forEach(a => {
                            html += `<div class="issue-pill rounded-lg px-3 py-2 border-l-4 ${sg.pillBorder}">
                                <div class="flex items-start gap-2">
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 flex-wrap mb-0.5">
                                            ${a.ligne>0?`<span class="text-[10px] font-mono font-bold text-bark-200 dark:text-bark-100">L.${a.ligne}</span>`:''}
                                            ${a.colonne&&a.colonne!=='-'?`<span class="text-[10px] text-bark-200 dark:text-bark-100 px-1.5 py-0.5 rounded bg-nature-200/30 dark:bg-forest-input/40">${esc(a.colonne)}</span>`:''}
                                        </div>
                                        <p class="text-xs">${esc(a.message)}</p>
                                        ${a.valeur||a.attendu?`<div class="mt-1 flex flex-wrap gap-x-3 text-[10px] font-mono">
                                            ${a.valeur?`<span class="text-bark-200 dark:text-bark-100">Trouve: ${esc(a.valeur)}</span>`:''}
                                            ${a.attendu?`<span class="text-nature-700 dark:text-nature-400">Attendu: ${esc(a.attendu)}</span>`:''}
                                        </div>`:''}
                                    </div>
                                </div>
                            </div>`;
                        });

                        html += `</div></details>`;
                    });
                } else {
                    html += `<p class="text-sm text-nature-600 dark:text-nature-400 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>Aucun probleme detecte pour cette commune</p>`;
                }

                html += `</div></details>`;
            });

            // Commune vide
            const vide = communes['(Commune vide)'];
            if (vide && vide.anomalies.length > 0) {
                html += `<div class="glass-card rounded-2xl p-4 border-l-4 border-red-500 anim-card">
                    <p class="font-bold text-red-600 dark:text-red-400 mb-2">&#9888; ${vide.anomalies.length} lignes sans commune</p>
                    <p class="text-xs text-bark-200 dark:text-bark-100">Ces lignes ne peuvent pas etre traitees. Ajoutez une commune dans le fichier source.</p>
                </div>`;
            }

            document.getElementById('communeGrid').innerHTML = html || '<p class="text-center text-bark-200">Aucune commune trouvee</p>';
        }

        function renderVerdict(s, hasCompare, comparison) {
            const vb = document.getElementById('verdictBanner');
            let compIssues = 0;
            if (hasCompare && comparison) {
                compIssues = Object.values(comparison).filter(c => c.statut === 'ECART' || c.statut === 'NON GENERE').length;
            }

            if (s.ERREUR === 0 && s.ATTENTION === 0 && compIssues === 0) {
                vb.className='rounded-2xl p-6 mb-6 anim-up bg-nature-500/10 dark:bg-nature-500/12 border border-nature-500/20';
                vb.innerHTML=`<div class="flex items-center gap-4"><div class="w-14 h-14 rounded-full bg-nature-500/20 flex items-center justify-center flex-shrink-0"><svg class="w-8 h-8 text-nature-600 dark:text-nature-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></div><div><p class="text-xl font-bold text-nature-700 dark:text-nature-400">${hasCompare?'Donnees coherentes':'Fichier valide'}</p><p class="text-sm text-bark-200 dark:text-bark-100 mt-1">${s.total_lignes} lignes. ${hasCompare?'Les sorties du systeme correspondent au fichier source.':'Aucun probleme bloquant. Vous pouvez lancer le traitement.'}</p></div></div>`;
            } else if (s.ERREUR === 0) {
                vb.className='rounded-2xl p-6 mb-6 anim-up bg-amber-500/10 dark:bg-amber-500/8 border border-amber-500/20';
                vb.innerHTML=`<div class="flex items-center gap-4"><div class="w-14 h-14 rounded-full bg-amber-500/20 flex items-center justify-center flex-shrink-0"><svg class="w-8 h-8 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg></div><div><p class="text-xl font-bold text-amber-600 dark:text-amber-400">Utilisable avec reserves</p><p class="text-sm text-bark-200 dark:text-bark-100 mt-1">${s.total_lignes} lignes. <strong>${s.ATTENTION} point(s)</strong> a verifier.${compIssues>0?' <strong>'+compIssues+' ecart(s)</strong> avec le systeme.':''}</p></div></div>`;
            } else {
                vb.className='rounded-2xl p-6 mb-6 anim-up bg-red-500/10 dark:bg-red-500/8 border border-red-500/20';
                vb.innerHTML=`<div class="flex items-center gap-4"><div class="w-14 h-14 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0"><svg class="w-8 h-8 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></div><div><p class="text-xl font-bold text-red-600 dark:text-red-400">Corrections necessaires</p><p class="text-sm text-bark-200 dark:text-bark-100 mt-1">${s.total_lignes} lignes. <strong>${s.ERREUR} erreur(s)</strong> et ${s.ATTENTION} avertissement(s). Corrigez avant traitement.</p></div></div>`;
            }
        }

        function resetPage(){hide('resultsSection');show('uploadSection');fi.value='';reportData=null;}
        function show(id){document.getElementById(id).classList.remove('hidden');}
        function hide(id){document.getElementById(id).classList.add('hidden');}
        function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
        function fmtMoney(n){if(!n)return '0 EUR';return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);}
    </script>
</body>
</html>
